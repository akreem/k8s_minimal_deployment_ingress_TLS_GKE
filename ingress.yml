apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-dep-ingress
  annotations:
    # Removed the static IP line that was causing issues
    networking.gke.io/managed-certificates: "my-ssl-cert"
    kubernetes.io/ingress.class: "gce"
spec:
  rules:
  - host: k8s.deployment.sh
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: my-dep-service
            port:
              number: 80
  - host: www.k8s.deployment.sh
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: my-dep-service
            port:
              number: 80
---
# Managed SSL Certificate (GKE magic!)
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: my-ssl-cert
spec:
  domains:
    - k8s.deployment.sh
    - www.k8s.deployment.sh