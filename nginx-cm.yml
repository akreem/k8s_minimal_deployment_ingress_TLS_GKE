apiVersion: v1
kind: ConfigMap
metadata:
  creationTimestamp: null
  name: nginx-config
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        
        location / {
            root /usr/share/nginx/html;
            index index.html;
            add_header X-Pod-Name $hostname;
            add_header X-Custom-Header "Hello from K8s!";
        }
        
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>My K8s Nginx</title>
        <style>
            body { font-family: Arial, sans-serif; margin: 40px; }
            .container { max-width: 600px; margin: 0 auto; text-align: center; }
            .pod-info { background: #f0f0f0; padding: 20px; border-radius: 8px; margin: 20px 0; }
        </style>
    </head>
    <body>
        <div class="container">
            <h1> My Kubernetes Nginx Deployment</h1>
            <div class="pod-info">
                <p><strong>Pod:</strong> <span id="hostname">Loading...</span></p>
                <p><strong>Timestamp:</strong> <span id="timestamp"></span></p>
            </div>
            <p>This page is served from a Kubernetes pod running on GKE!</p>
        </div>
        
        <script>
            document.getElementById('hostname').textContent = window.location.hostname;
            document.getElementById('timestamp').textContent = new Date().toLocaleString();
        </script>
    </body>
    </html>